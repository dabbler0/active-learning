# Deploy Philosophy Notes to GitHub Pages
#
# Triggers on every push to main that touches source files
# (or the workflow file itself).
#
# The built artefact (dist/) is uploaded as the Pages artefact and served
# at the repository root:  https://<org>.github.io/<repo>/
#
# All asset links in index.html are relative so no base-path changes needed.

name: Deploy Philosophy Notes to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'index.html'
      - 'build.js'
      - 'package*.json'
      - '.github/workflows/deploy-philosophy-js.yml'
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; do not cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # No npm cache — avoids stale-cache failures after directory restructure

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build output
        run: ls -lh dist/

      - name: Upload Pages artefact
        uses: actions/upload-pages-artifact@v3
        with:
          # Explicit ./ prefix; contents of dist/ become the Pages site root
          path: ./dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
