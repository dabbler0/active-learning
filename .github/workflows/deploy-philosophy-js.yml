# Deploy philosophy-js to GitHub Pages
#
# Triggers on every push to main that touches the philosophy-js directory
# (or the workflow file itself).
#
# The built artefact is a handful of static files in philosophy-js/dist/:
#   index.html   app.css   bundle.js
#
# They are served at:
#   https://<org>.github.io/<repo>/philosophy-js/
#
# No base-path changes are required because all asset links in index.html
# are relative ("app.css", "bundle.js").

name: Deploy Philosophy Notes to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'philosophy-js/**'
      - '.github/workflows/deploy-philosophy-js.yml'
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; do not cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: philosophy-js

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: philosophy-js/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Pages artefact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the dist/ directory produced by the build
          path: philosophy-js/dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
